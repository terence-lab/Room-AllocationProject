<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Allocation Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    header { display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f5f5f5; }
    .controls { display: flex; gap: .5rem; }
    button { padding: .5rem .75rem; }
  </style>
</head>
<body>
  <header>
    <h1>Administrator Dashboard</h1>
    <div class="controls">
      <button id="refresh">Refresh Allocations</button>
      <button id="run">Run Allocation (Today)</button>
    </div>
  </header>

  <section>
    <h2>Allocations</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Time</th>
          <th>Class</th>
          <th>Enrollment</th>
          <th>Room</th>
          <th>Online?</th>
        </tr>
      </thead>
      <tbody id="alloc-body"></tbody>
    </table>
  </section>

  <script>
    const api = location.hostname === 'localhost' ? 'http://127.0.0.1:8000' : '';

    async function loadAllocations(){
      const res = await fetch(`${api}/admin/allocations`);
      const data = await res.json();
      const tbody = document.getElementById('alloc-body');
      tbody.innerHTML = data.map(a => `
        <tr>
          <td>${a.id}</td>
          <td>${a.date}</td>
          <td>${a.start} - ${a.end}</td>
          <td>${a.class}</td>
          <td>${a.enrollment}</td>
          <td>${a.room ?? '-'}</td>
          <td>${a.is_online ? 'Yes' : 'No'}</td>
        </tr>
      `).join('');
    }

    async function runAllocation(){
      await fetch(`${api}/allocations/run`, { method: 'POST' });
      await loadAllocations();
    }

    document.getElementById('refresh').addEventListener('click', loadAllocations);
    document.getElementById('run').addEventListener('click', runAllocation);

    loadAllocations();
  </script>
</body>
</html>
